[package]
name = "ody-sandboxing"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "ody_sandboxing"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[features]
# Enables the Windows restricted-token/elevated sandbox backend. Off by default
# so local dev builds skip compiling/linking the Windows sandbox crate; release
# / packaging builds for Windows must pass `--features windows-sandbox` for
# Windows sandbox execution to work at runtime.
windows-sandbox = ["dep:ody-windows-sandbox"]

[dependencies]
ody-network-proxy = { workspace = true }
ody-protocol = { workspace = true }
ody-utils-absolute-path = { workspace = true }
ody-utils-path-uri = { workspace = true }
ody-windows-sandbox = { workspace = true, optional = true }
dunce = { workspace = true }
libc = { workspace = true }
serde_json = { workspace = true }
regex-lite = { workspace = true }
tracing = { workspace = true, features = ["log"] }
url = { workspace = true }
which = { workspace = true }

[target.'cfg(windows)'.dependencies]
ody-utils-home-dir = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
