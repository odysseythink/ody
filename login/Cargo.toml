[package]
name = "ody-login"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
base64 = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
ody-agent-identity = { workspace = true }
ody-app-server-protocol = { workspace = true }
ody-client = { workspace = true }
ody-config = { workspace = true }
ody-keyring-store = { workspace = true }
ody-model-provider-info = { workspace = true }
ody-otel = { workspace = true }
ody-protocol = { workspace = true }
ody-secrets = { workspace = true }
ody-terminal-detection = { workspace = true }
ody-utils-template = { workspace = true }
once_cell = { workspace = true }
os_info = { workspace = true }
rand = { workspace = true }
reqwest = { workspace = true, features = ["json", "blocking"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tiny_http = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
tracing = { workspace = true }
url = { workspace = true }
urlencoding = { workspace = true }
