[package]
edition.workspace = true
license.workspace = true
name = "ody-goal-extension"
version.workspace = true

[lib]
name = "ody_goal_extension"
path = "src/lib.rs"
test = false
doctest = false

[lints]
workspace = true

[dependencies]
ody-analytics = { workspace = true }
ody-core = { workspace = true }
ody-extension-api = { workspace = true }
ody-otel = { workspace = true }
ody-protocol = { workspace = true }
ody-state = { workspace = true }
ody-tools = { workspace = true }
ody-utils-template = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tracing = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
