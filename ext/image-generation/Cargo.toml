[package]
edition.workspace = true
license.workspace = true
name = "ody-image-generation-extension"
version.workspace = true

[lib]
name = "ody_image_generation_extension"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
ody-api = { workspace = true }
ody-core = { workspace = true }
ody-extension-api = { workspace = true }
ody-login = { workspace = true }
ody-model-provider = { workspace = true }
ody-model-provider-info = { workspace = true }
ody-protocol = { workspace = true }
ody-tools = { workspace = true }
ody-utils-absolute-path = { workspace = true }
ody-utils-image = { workspace = true }
ody-utils-path-uri = { workspace = true }
http = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
