[package]
edition.workspace = true
license.workspace = true
name = "ody-skills-extension"
version.workspace = true

[lib]
name = "ody_skills_extension"
path = "src/lib.rs"
test = false
doctest = false

[lints]
workspace = true

[dependencies]
ody-core-skills = { workspace = true }
ody-exec-server = { workspace = true }
ody-extension-api = { workspace = true }
ody-mcp = { workspace = true }
ody-protocol = { workspace = true }
ody-tools = { workspace = true }
ody-utils-absolute-path = { workspace = true }
ody-utils-path-uri = { workspace = true }
ody-utils-string = { workspace = true }
regex = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
