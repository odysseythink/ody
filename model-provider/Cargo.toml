[package]
edition.workspace = true
license.workspace = true
name = "ody-model-provider"
version.workspace = true

[lib]
doctest = false
name = "ody_model_provider"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
ody-api = { workspace = true }
ody-client = { workspace = true }
ody-feedback = { workspace = true }
ody-login = { workspace = true }
ody-model-provider-info = { workspace = true }
ody-models-manager = { workspace = true }
ody-otel = { workspace = true }
ody-tools = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
anyhow = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
base64 = { workspace = true }

ody-protocol = { workspace = true }
ody-response-debug-context = { workspace = true }
http = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
tracing = { workspace = true, features = ["log"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
serde_json = { workspace = true }

tokio = { workspace = true, features = ["macros", "rt"] }
wiremock = { workspace = true }
